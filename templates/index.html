<!DOCTYPE html>
<html>
<head>
    <title>Skill → Project Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <section class="hero">
        <h1>Find Projects Based On Your Skills</h1>
        <form method="POST">
            <input type="text" name="skill" placeholder="Enter your skill" required>
            <select name="level">
                <option>Beginner</option>
                <option>Intermediate</option>
                <option>Advanced</option>
            </select>
            <input type="text" name="interest" placeholder="Enter your interest" required>
            <select name="time">
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>
            <button type="submit">Generate Projects</button>
        </form>
    </section>

    <section class="features">
        <div class="card">Personalized Recommendations</div>
        <div class="card">Step-by-Step Roadmaps</div>
        <div class="card">Starter Code Included</div>
    </section>

    <section class="output">
        {% for project in projects %}
        <div class="project-card">
            <h2>{{ project.title }}</h2>
            <p>{{ project.description }}</p>
            <p>Difficulty: {{ project.level }}</p>
            <button>View Details</button>
        </div>
        {% endfor %}
    </section>
</body>
</html>
