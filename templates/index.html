<!DOCTYPE html>
<html>
<head>
    <title>DevPath</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="hero">
    <h1>Find Projects Based On Your Skills</h1>

    <form method="POST">
        <select name="skill">
            <option value="Python">Python</option>
            <option value="Web">Web</option>
        </select>

        <select name="level">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
        </select>

        <select name="interest">
            <option value="Data">Data</option>
            <option value="Web">Web</option>
            <option value="General">General</option>
        </select>

        <select name="time">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>

        <button type="submit">Generate Projects</button>
    </form>
</div>

<div class="features">
    <div class="card">Personalized Recommendations</div>
    <div class="card">Step-by-Step Roadmaps</div>
    <div class="card">Starter Code Included</div>
</div>

<div class="results">
    {% for project in recommendations %}
    <div class="project-card">
        <h3>{{ project.title }}</h3>
        <p>{{ project.description }}</p>
        <p><strong>Level:</strong> {{ project.level }}</p>
        <button>View Details</button>
    </div>
    {% endfor %}
</div>

</body>
</html>
